name: SENG3011 CI

on:
  pull_request:
    branches:
      - main
      - master
  push: 
    branches: [main]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12.3
      uses: actions/setup-python@v3
      with:
        python-version: "3.12.3"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-mock pytest-cov mypy psycopg2-binary
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Type Checking
      run: |
        mypy . --explicit-package-bases --ignore-missing-imports --exclude "microservices/data_retrieval/package/"
    - name: Test and Coverage
      env:
        AWS_ACCESS_KEY_ID: testing
        AWS_SECRET_ACCESS_KEY: testing
        AWS_SECURITY_TOKEN: testing
        AWS_SESSION_TOKEN: testing
        AWS_DEFAULT_REGION: ap-southeast-2
        BUCKET_NAME: test-bucket
      run: |
        python3 -m pytest --cov=. --cov-fail-under=85 --ignore=microservices/testing

  terraform-build-check:
    name: Terraform Build Check
    runs-on: ubuntu-latest
    environment: staging
    env:
      TF_VAR_aws_suffix: "staging"
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: 'ap-southeast-2'
    strategy:
      matrix:
        directory: [
            "terraform",
        ]
    defaults:
        run:
            shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ matrix.directory }}
        run: terraform init -backend-config=staging.hcl

      - name: Terraform Format
        working-directory: ${{ matrix.directory }}
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: ${{ matrix.directory }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ matrix.directory }}
        env:
            TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: terraform plan -input=false

  terraform-staging:
    needs: [terraform-build-check, build]
    name: Terraform Staging
    runs-on: ubuntu-latest
    environment: staging
    env:
      TF_VAR_aws_suffix: "staging"
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: 'ap-southeast-2'
    strategy:
      matrix:
        directory: [
            "terraform",
        ]
    defaults:
        run:
            shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ matrix.directory }}
        run: terraform init -backend-config=staging.hcl

      - name: Terraform Format
        working-directory: ${{ matrix.directory }}
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: ${{ matrix.directory }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ matrix.directory }}
        run: terraform plan -input=false
        
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        working-directory: ${{ matrix.directory }}
        run: terraform apply -auto-approve -input=false

  testing-microservice:
    needs: terraform-staging
    name: Integration Testing
    runs-on: ubuntu-latest
    environment: staging
    env:
      TF_VAR_aws_suffix: "staging"
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: 'ap-southeast-2'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12.3
        uses: actions/setup-python@v3
        with:
          python-version: "3.12.3"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock pytest-cov psycopg2-binary pytest-html
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run Integration Tests
        run: |
          python3 -m pytest --html=report.html --self-contained-html
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-report
          path: report.html

  terraform-production:
    needs: testing-microservice
    name: Terraform production
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_VAR_aws_suffix: "production"
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: 'ap-southeast-2'
    strategy:
      matrix:
        directory: [
            "terraform",
        ]
    defaults:
        run:
            shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ matrix.directory }}
        run: terraform init -backend-config=production.hcl

      - name: Terraform Format
        working-directory: ${{ matrix.directory }}
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: ${{ matrix.directory }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ matrix.directory }}
        run: terraform plan -input=false
        
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ${{ matrix.directory }}
        run: terraform apply -auto-approve -input=false
