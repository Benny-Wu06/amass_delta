name: SENG3011 CI

on:
  pull_request:
    branches:
      - main
      - master
  push: 
    branches: [main]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12.3
      uses: actions/setup-python@v3
      with:
        python-version: "3.12.3"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-mock pytest-cov mypy psycopg2-binary
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Build Collection Docker Image
      run: |
        docker build -t amass-collection -f microservices/data_collection/Dockerfile .
    
    - name: Build Retrieval Docker Image
      run: |
        docker build -t amass-retrieval -f microservices/data_retrieval/Dockerfile .

    - name: Build Visualisation Docker Image
      run: |
        docker build -t amass-visualisation -f microservices/visualisation/Dockerfile .

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: "ap-southeast-2"
        BUCKET_NAME: "amass-cisa-bucket-01"
      run: |
        python3 -m pytest
    - name: Type Checking
      run: |
        mypy . --explicit-package-bases --ignore-missing-imports --exclude "microservices/data_retrieval/package/"
    - name: Test and Coverage
      env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "ap-southeast-2"
          BUCKET_NAME: "amass-cisa-bucket-01"
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      run: |
        python3 -m pytest --cov=. --cov-fail-under=85

  terraform-build-check:
    name: Terraform Build Check
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: 'ap-southeast-2'
    strategy:
      matrix:
        directory: [
            "terraform",
        ]
    defaults:
        run:
            shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ matrix.directory }}
        run: terraform init

      - name: Terraform Format
        working-directory: ${{ matrix.directory }}
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: ${{ matrix.directory }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ matrix.directory }}
        env:
            # This maps your GitHub Secret to the Terraform variable
            TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
            TF_VAR_private_subnet_ids: ${{ secrets.PRIVATE_SUBNET_IDS }}
            TF_VAR_lambda_sg_id: ${{ secrets.LAMBDA_SG_ID }}
            # Your existing AWS secrets
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: terraform plan -input=false
        
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ${{ matrix.directory }}
        run: terraform apply -auto-approve -input=false
